<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mi Entreno</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0b0e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Entreno">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

:root {
  --bg: #0a0b0e;
  --surface: #111318;
  --surface2: #181c24;
  --border: #1f2430;
  --border2: #2a3045;
  --text: #e2e6f0;
  --muted: #505878;
  --muted2: #8090b0;
  --push: #ec4899;
  --pull: #06b6d4;
  --legs-q: #a855f7;
  --legs-f: #f59e0b;
  --rest: #2a3045;
  --success: #22c55e;
  --warning: #eab308;
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,11,14,0.94);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px; font-weight: 700; letter-spacing: -0.5px;
}
.logo em { color: var(--push); font-style: normal; }
.back-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 7px 14px; border-radius: 10px;
  cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif;
  display: none; align-items: center; gap: 5px;
}
.back-btn:active { opacity: 0.7; }

/* ── VIEWS ── */
.view { display: none; padding-bottom: 80px; }
.view.active { display: block; }

/* ══ WEEK VIEW ══ */
.week-top { padding: 20px 18px 10px; }
.week-greeting { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted2); margin-bottom: 4px; }
.week-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

.week-nav { display: flex; align-items: center; gap: 10px; padding: 10px 18px 16px; }
.week-nav button { width: 30px; height: 30px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.week-range { font-size: 12px; color: var(--muted2); flex: 1; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 18px 16px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; text-align: center; }
.stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: var(--push); }
.stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 2px; }

.days-list { padding: 0 18px; display: flex; flex-direction: column; gap: 8px; }

.day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 14px 14px 0; display: flex; align-items: center; gap: 12px; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s; }
.day-card:active { opacity: 0.8; }
.day-card.is-rest { cursor: default; opacity: 0.55; }
.day-card.is-rest:active { opacity: 0.55; }
.day-card.is-done { border-color: #1a3526; background: #0c1910; }
.day-card.is-today { border-color: var(--border2); }

.day-stripe { width: 4px; align-self: stretch; border-radius: 0 3px 3px 0; flex-shrink: 0; min-height: 48px; }
.stripe-push { background: var(--push); }
.stripe-pull { background: var(--pull); }
.stripe-legs-q { background: var(--legs-q); }
.stripe-legs-f { background: var(--legs-f); }
.stripe-rest { background: var(--rest); }

.day-main { flex: 1; min-width: 0; }
.day-dow { font-size: 11px; color: var(--muted2); font-weight: 500; margin-bottom: 1px; }
.day-name { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-sub { font-size: 11px; color: var(--muted); }

.day-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.type-pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.pill-push { background: rgba(236,72,153,0.15); color: var(--push); }
.pill-pull { background: rgba(6,182,212,0.15); color: var(--pull); }
.pill-legs-q { background: rgba(168,85,247,0.15); color: var(--legs-q); }
.pill-legs-f { background: rgba(245,158,11,0.15); color: var(--legs-f); }
.pill-rest { background: rgba(42,48,69,0.5); color: var(--muted2); }

.day-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; }
.day-card.is-done .day-check { background: var(--success); border-color: var(--success); color: #fff; }

.today-pip { position: absolute; top: 8px; left: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--push); box-shadow: 0 0 6px var(--push); }

/* ══ SESSION VIEW ══ */
.session-top { padding: 18px 18px 12px; }
.session-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
.session-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.session-sub { font-size: 13px; color: var(--muted2); line-height: 1.4; }

/* ── WARM-UP BLOCK ── */
.warmup-block {
  margin: 0 18px 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: hidden;
}
.warmup-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 14px; cursor: pointer;
}
.warmup-header-left { display: flex; align-items: center; gap: 9px; }
.warmup-icon { font-size: 18px; }
.warmup-title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; }
.warmup-sub { font-size: 11px; color: var(--muted2); margin-top: 2px; }
.warmup-chevron { color: var(--muted); font-size: 11px; transition: transform 0.2s; }
.warmup-block.open .warmup-chevron { transform: rotate(180deg); }
.warmup-body { display: none; border-top: 1px solid var(--border); padding: 12px 14px 14px; }
.warmup-block.open .warmup-body { display: block; }
.warmup-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.warmup-item:last-child { border-bottom: none; padding-bottom: 0; }
.warmup-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.warmup-info { flex: 1; }
.warmup-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.warmup-desc { font-size: 11px; color: var(--muted2); line-height: 1.4; }
.warmup-time { font-size: 11px; font-weight: 700; color: var(--warning); flex-shrink: 0; margin-top: 1px; }

/* ── EXERCISE LIST ── */
.ex-list { padding: 0 18px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 110px; }

.ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.ex-head { padding: 13px 14px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
.ex-num { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; margin-top: 1px; }
.ex-meta { flex: 1; min-width: 0; }
.ex-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.ex-muscle { font-size: 11px; color: var(--muted2); margin-bottom: 3px; }
.ex-spec { font-size: 11px; color: var(--muted); }
.ex-suggest { font-size: 11px; font-weight: 600; color: var(--warning); background: rgba(234,179,8,0.1); padding: 2px 7px; border-radius: 5px; display: inline-block; margin-top: 4px; }
.ex-chevron { color: var(--muted); font-size: 11px; margin-top: 5px; flex-shrink: 0; transition: transform 0.2s; }
.ex-card.open .ex-chevron { transform: rotate(180deg); }

.ex-body { display: none; border-top: 1px solid var(--border); }
.ex-card.open .ex-body { display: block; }

.ex-how { padding: 13px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.ex-how h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 9px; }
.ex-how ol { padding-left: 16px; display: flex; flex-direction: column; gap: 5px; }
.ex-how li { font-size: 12px; line-height: 1.5; color: #9aa0bc; }
.ex-tip { margin-top: 10px; padding: 8px 11px; background: rgba(236,72,153,0.07); border-left: 3px solid var(--push); border-radius: 0 6px 6px 0; font-size: 11px; color: #9aa0bc; line-height: 1.4; }
.ex-video-link { margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text); text-decoration: none; }
.ex-video-link:active { opacity: 0.7; }
.ex-video-link .yt-ico { font-size: 13px; }

/* ── SETS ── */
.sets-log { padding: 12px 14px 14px; }
.sets-log-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sets-log-head h4 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
.rest-label { font-size: 10px; color: var(--muted2); font-weight: 600; }

.set-rows { display: flex; flex-direction: column; gap: 7px; }
.set-row {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 11px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  transition: border-color 0.15s;
}
.set-row.done-row { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.05); }
.set-n { font-size: 12px; font-weight: 700; color: var(--muted); width: 20px; flex-shrink: 0; }
.set-suggest { flex: 1; font-size: 12px; color: var(--muted2); line-height: 1.3; }
.set-suggest strong { color: var(--text); font-weight: 600; }
.set-done-btn {
  background: var(--surface); border: 1.5px solid var(--border2);
  color: var(--muted); width: 38px; height: 38px; border-radius: 9px;
  font-size: 14px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.15s;
}
.set-done-btn.done { background: var(--success); border-color: var(--success); color: #fff; }
.set-done-btn:active { opacity: 0.7; }

/* ── REST TIMER OVERLAY ── */
.rest-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,11,14,0.97);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
}
.rest-overlay.active { display: flex; }

.rest-ring {
  position: relative;
  width: 200px; height: 200px;
}
.rest-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.rest-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
.rest-ring-progress { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }
.rest-ring-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.rest-seconds {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 52px; font-weight: 700; letter-spacing: -2px; line-height: 1;
}
.rest-label-small { font-size: 11px; color: var(--muted2); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.rest-exercise-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; font-weight: 700; color: var(--muted2);
  text-align: center; max-width: 260px; line-height: 1.3;
}
.rest-set-info { font-size: 13px; color: var(--muted); text-align: center; }

.rest-btn-row { display: flex; gap: 12px; }
.rest-skip-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--muted2); padding: 12px 24px; border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer;
}
.rest-skip-btn:active { opacity: 0.7; }
.rest-add-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 12px 20px; border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer;
}
.rest-add-btn:active { opacity: 0.7; }

/* session footer */
.session-foot { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 18px 16px; background: rgba(10,11,14,0.96); backdrop-filter: blur(16px); border-top: 1px solid var(--border); }
.finish-btn { width: 100%; background: var(--push); color: #fff; border: none; padding: 14px; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.2px; transition: opacity 0.15s; }
.finish-btn:active { opacity: 0.85; }
.finish-btn.done-state { background: #1a3526; color: var(--success); border: 1px solid var(--success); }

/* ══ HISTORY VIEW ══ */
.hist-top { padding: 20px 18px 12px; }
.hist-top h2 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 3px; }
.hist-top p { font-size: 13px; color: var(--muted2); }
.hist-list { padding: 0 18px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 30px; }
.hist-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 12px; }
.hist-stripe { width: 3px; align-self: stretch; border-radius: 3px; min-height: 40px; flex-shrink: 0; }
.hist-info { flex: 1; }
.hist-date { font-size: 11px; color: var(--muted2); margin-bottom: 2px; }
.hist-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; }
.hist-sets { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hist-badge { font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 7px; text-transform: uppercase; letter-spacing: 0.4px; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13px; line-height: 1.6; }

/* ══ BOTTOM NAV ══ */
.bnav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17,19,24,0.97); backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; padding: 6px 0 14px; }
.bnav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--muted); cursor: pointer; padding: 5px 0; font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; transition: color 0.15s; }
.bnav-btn .ico { font-size: 19px; }
.bnav-btn.active { color: var(--push); }

/* toast */
.toast { position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--success); color: #fff; padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Mi<em>Entreno</em></div>
  <button class="back-btn" id="backBtn" onclick="goBack()">← Volver</button>
</div>

<!-- WEEK VIEW -->
<div class="view active" id="viewWeek">
  <div class="week-top">
    <div class="week-greeting">Plan semanal</div>
    <div class="week-title" id="weekTitle">Esta semana</div>
  </div>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-range" id="weekRange"></span>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="sSessions">0</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat-box"><div class="stat-val" id="sStreak">0</div><div class="stat-lbl">Racha</div></div>
    <div class="stat-box"><div class="stat-val" id="sSets">0</div><div class="stat-lbl">Sets totales</div></div>
  </div>
  <div class="days-list" id="daysList"></div>
</div>

<!-- SESSION VIEW -->
<div class="view" id="viewSession">
  <div class="session-top">
    <div class="session-pill" id="sPill"></div>
    <div class="session-title" id="sTitle"></div>
    <div class="session-sub" id="sSub"></div>
  </div>
  <!-- Warm-up block (rendered by JS) -->
  <div id="warmupContainer"></div>
  <div class="ex-list" id="exList"></div>
  <div class="session-foot">
    <button class="finish-btn" id="finishBtn" onclick="finishSession()">Marcar sesión completada ✓</button>
  </div>
</div>

<!-- HISTORY VIEW -->
<div class="view" id="viewHistory">
  <div class="hist-top">
    <h2>Historial</h2>
    <p>Sesiones completadas</p>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav" id="bnav">
  <button class="bnav-btn active" id="navWeek" onclick="showView('week')"><span class="ico">📅</span>Semana</button>
  <button class="bnav-btn" id="navHist" onclick="showView('history')"><span class="ico">📊</span>Historial</button>
</div>

<div class="toast" id="toast"></div>

<!-- REST TIMER OVERLAY -->
<div class="rest-overlay" id="restOverlay">
  <div class="rest-exercise-name" id="restExName"></div>
  <div class="rest-set-info" id="restSetInfo"></div>
  <div class="rest-ring">
    <svg viewBox="0 0 200 200" width="200" height="200">
      <circle class="rest-ring-bg" cx="100" cy="100" r="88"/>
      <circle class="rest-ring-progress" id="restRingProgress" cx="100" cy="100" r="88"/>
    </svg>
    <div class="rest-ring-inner">
      <div class="rest-seconds" id="restSeconds">90</div>
      <div class="rest-label-small">descanso</div>
    </div>
  </div>
  <div class="rest-btn-row">
    <button class="rest-add-btn" onclick="addRestTime(15)">+15 seg</button>
    <button class="rest-skip-btn" onclick="skipRest()">Saltar ▶</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// PERFIL
// ══════════════════════════════════════════════════
const USER = { weight: 65, height: 160 };

// ══════════════════════════════════════════════════
// PLAN SEMANAL — Superior/Inferior x2, 4 días
// (Lun=1 Sup. Empuje, Mar=2 Inf. Glúteo, Mié=3 Descanso,
//  Jue=4 Sup. Jalón, Vie=5 Inf. Pierna completa, Sáb=6 Descanso, Dom=0 Descanso)
// ══════════════════════════════════════════════════
const WEEK_PLAN = [
  { dow:1, type:'push',   title:'Superior Empuje',        sub:'Pecho · Hombro · Tríceps' },
  { dow:2, type:'legs-q', title:'Inferior Glúteo',        sub:'Glúteo · Cuádriceps · Aductores' },
  { dow:3, type:'rest',   title:'Descanso',                sub:'Recuperación activa' },
  { dow:4, type:'pull',   title:'Superior Jalón',          sub:'Espalda · Bíceps · Core' },
  { dow:5, type:'legs-f', title:'Inferior Pierna Completa',sub:'Cuádriceps · Femoral · Pantorrilla' },
  { dow:6, type:'rest',   title:'Descanso',                sub:'Recuperación completa' },
  { dow:0, type:'rest',   title:'Descanso',                sub:'Recuperación completa' },
];

const TYPE_META = {
  push:    { label:'Empuje',  pillClass:'pill-push',   stripeClass:'stripe-push',   color:'var(--push)' },
  pull:    { label:'Jale',    pillClass:'pill-pull',   stripeClass:'stripe-pull',   color:'var(--pull)' },
  'legs-q':{ label:'Glúteo',  pillClass:'pill-legs-q', stripeClass:'stripe-legs-q', color:'var(--legs-q)' },
  'legs-f':{ label:'Pierna',  pillClass:'pill-legs-f', stripeClass:'stripe-legs-f', color:'var(--legs-f)' },
  rest:    { label:'Descanso',pillClass:'pill-rest',   stripeClass:'stripe-rest',   color:'var(--rest)' },
};

// ══════════════════════════════════════════════════
// CALENTAMIENTOS
// ══════════════════════════════════════════════════
const WARMUPS = {
  push: {

// ══════════════════════════════════════════════════
function getDB() { try { return JSON.parse(localStorage.getItem('tlog_esposa') || '{}'); } catch(e) { return {}; } }
function saveDB(d) { localStorage.setItem('tlog_esposa', JSON.stringify(d)); }

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let weekOffset = 0;
let activeSession = null;

// ── REST TIMER STATE ──
let restTimer = null;
let restTotal = 90;
let restRemaining = 90;
let restExerciseName = '';
let restSetLabel = '';

// ══════════════════════════════════════════════════
// AUDIO — beeps con Web Audio API
// ══════════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, dur, vol = 0.6, type = 'sine') {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playRestDone() {
  beep(440, 0.15, 0.5);
  setTimeout(() => beep(554, 0.15, 0.5), 180);
  setTimeout(() => beep(660, 0.4,  0.7), 360);
}

function playTickNear() {
  beep(880, 0.08, 0.3, 'square');
}

// ══════════════════════════════════════════════════
// REST TIMER
// ══════════════════════════════════════════════════
const CIRCUMFERENCE = 2 * Math.PI * 88; // r = 88

function startRest(seconds, exName, setLabel, color) {
  clearInterval(restTimer);
  restTotal     = seconds;
  restRemaining = seconds;
  restExerciseName = exName;
  restSetLabel     = setLabel;

  const overlay   = document.getElementById('restOverlay');
  const secEl     = document.getElementById('restSeconds');
  const exEl      = document.getElementById('restExName');
  const infoEl    = document.getElementById('restSetInfo');
  const progress  = document.getElementById('restRingProgress');

  progress.style.stroke = color || 'var(--push)';
  progress.style.strokeDasharray  = CIRCUMFERENCE;
  progress.style.strokeDashoffset = 0;

  exEl.textContent   = exName;
  infoEl.textContent = setLabel;
  secEl.textContent  = restRemaining;
  overlay.classList.add('active');

  try { getAudioCtx().resume(); } catch(e) {}

  restTimer = setInterval(() => {
    restRemaining--;
    secEl.textContent = restRemaining;

    const ratio = restRemaining / restTotal;
    progress.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);

    if (restRemaining <= 3 && restRemaining > 0) playTickNear();

    if (restRemaining <= 0) {
      clearInterval(restTimer);
      playRestDone();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      setTimeout(() => closeRest(), 800);
    }
  }, 1000);
}

function skipRest() {
  clearInterval(restTimer);
  closeRest();
}

function addRestTime(seconds) {
  restRemaining = Math.min(restRemaining + seconds, restTotal + 60);
  document.getElementById('restSeconds').textContent = restRemaining;
}

function closeRest() {
  document.getElementById('restOverlay').classList.remove('active');
  clearInterval(restTimer);
}

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}
function getWeekDates(offset) {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function videoSearchUrl(exerciseName) {
  const q = encodeURIComponent(`${exerciseName} técnica correcta`);
  return `https://www.youtube.com/results?search_query=${q}`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════
// WEEK VIEW
// ══════════════════════════════════════════════════
function renderWeek() {
  const dates = getWeekDates(weekOffset);
  const db = getDB();
  const opts = {day:'numeric',month:'short'};
  document.getElementById('weekRange').textContent =
    `${dates[0].toLocaleDateString('es-MX',opts)} — ${dates[6].toLocaleDateString('es-MX',opts)}`;
  document.getElementById('weekTitle').textContent =
    weekOffset===0?'Esta semana':weekOffset===-1?'Semana pasada':`Semana ${weekOffset>0?'+':''}${weekOffset}`;

  let sessCount=0, setsCount=0, streak=0;
  const sd = new Date();
  for(let i=0;i<60;i++){
    const k=fmtDate(sd); const dow=sd.getDay();
    const plan=WEEK_PLAN.find(p=>p.dow===dow);
    if(plan?.type==='rest'){sd.setDate(sd.getDate()-1);continue;}
    if(db[k]?.done){streak++;sd.setDate(sd.getDate()-1);}else break;
  }

  const DOW_NAMES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const DOW_FULL  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const list = document.getElementById('daysList');
  list.innerHTML = '';

  dates.forEach(date => {
    const dow = date.getDay();
    const plan = WEEK_PLAN.find(p=>p.dow===dow) || {type:'rest',title:'Descanso',sub:''};
    const meta = TYPE_META[plan.type] || TYPE_META.rest;
    const key = fmtDate(date);
    const done = db[key]?.done;
    if(done && plan.type!=='rest') sessCount++;
    if(done) setsCount += (db[key]?.totalSets||0);

    const card = document.createElement('div');
    card.className = `day-card${plan.type==='rest'?' is-rest':''}${done?' is-done':''}${isToday(date)?' is-today':''}`;
    card.innerHTML = `
      <div class="day-stripe ${meta.stripeClass}"></div>
      <div class="day-main">
        <div class="day-dow">${DOW_FULL[dow]} · ${date.toLocaleDateString('es-MX',opts)}</div>
        <div class="day-name">${plan.title}</div>
        <div class="day-sub">${plan.sub}</div>
      </div>
      <div class="day-right">
        <span class="type-pill ${meta.pillClass}">${meta.label}</span>
        <div class="day-check">${done?'✓':''}</div>
      </div>
      ${isToday(date)?'<div class="today-pip"></div>':''}
    `;
    if(plan.type!=='rest'){
      card.onclick = ()=>openSession(plan.type, key, `${DOW_FULL[dow]} ${date.toLocaleDateString('es-MX',opts)}`);
    }
    list.appendChild(card);
  });

  document.getElementById('sSessions').textContent = sessCount;
  document.getElementById('sStreak').textContent = streak;
  document.getElementById('sSets').textContent = setsCount;
}

function changeWeek(d) { weekOffset+=d; renderWeek(); }

// ══════════════════════════════════════════════════
// SESSION VIEW
// ══════════════════════════════════════════════════
function openSession(type, dateKey, dayLabel) {
  const session = SESSIONS[type];
  if(!session) return;
  activeSession = {type, dateKey, dayLabel};
  const db = getDB();
  const saved = db[dateKey] || {};
  const meta = TYPE_META[type];

  const pill = document.getElementById('sPill');
  pill.textContent = meta.label;
  pill.className = `session-pill ${meta.pillClass}`;
  document.getElementById('sTitle').textContent = dayLabel;
  document.getElementById('sSub').textContent = WEEK_PLAN.find(p=>p.type===type)?.sub || '';

  const isDone = saved.done;
  const btn = document.getElementById('finishBtn');
  btn.textContent = isDone ? '✓ Sesión completada — volver a marcar' : 'Marcar sesión completada ✓';
  btn.className = isDone ? 'finish-btn done-state' : 'finish-btn';

  // Warm-up
  renderWarmup(type, meta);

  // Exercises
  const exList = document.getElementById('exList');
  exList.innerHTML = '';
  const color = meta.color;

  session.exercises.forEach((ex, ei) => {
    const savedEx = saved.exercises?.[ei] || {};
    const card = document.createElement('div');
    card.className = 'ex-card';
    card.id = `ec${ei}`;

    let setsHTML = '';
    for(let s=0; s<ex.sets; s++){
      const ss = savedEx.sets?.[s] || {};
      const isDoneSet = ss.done || false;
      setsHTML += `
        <div class="set-row${isDoneSet?' done-row':''}" id="sr${ei}_${s}">
          <div class="set-n">${s+1}</div>
          <div class="set-suggest"><strong>${ex.repsHint} reps</strong> · ${ex.suggest}</div>
          <button class="set-done-btn${isDoneSet?' done':''}" id="sb${ei}_${s}" onclick="toggleSetDone(${ei},${s},this,'${ex.name.replace(/'/g,"\\'")}',${ex.rest},'${color}')">✓</button>
        </div>`;
    }

    card.innerHTML = `
      <div class="ex-head" onclick="toggleEx(${ei})">
        <div class="ex-num" style="background:${color}18;color:${color}">${ei+1}</div>
        <div class="ex-meta">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-muscle">${ex.muscle}</div>
          <div class="ex-spec">${ex.spec}</div>
          <div class="ex-suggest">💡 ${ex.suggest}</div>
        </div>
        <div class="ex-chevron">▼</div>
      </div>
      <div class="ex-body">
        <div class="ex-how">
          <h4>Cómo ejecutarlo</h4>
          <ol>${ex.instructions.map(i=>`<li>${i}</li>`).join('')}</ol>
          <div class="ex-tip">⚡ ${ex.tip}</div>
          <a class="ex-video-link" href="${videoSearchUrl(ex.name)}" target="_blank" rel="noopener"><span class="yt-ico">▶️</span> Ver videos de técnica</a>
        </div>
        <div class="sets-log">
          <div class="sets-log-head">
            <h4>Series</h4>
            <span class="rest-label">⏱ Descanso: ${ex.rest}s</span>
          </div>
          <div class="set-rows">${setsHTML}</div>
        </div>
      </div>`;

    exList.appendChild(card);
  });

  showView('session');
}

function renderWarmup(type, meta) {
  const container = document.getElementById('warmupContainer');
  const warmup = WARMUPS[type];
  if (!warmup) { container.innerHTML = ''; return; }

  const block = document.createElement('div');
  block.className = 'warmup-block';
  block.id = 'warmupBlock';

  const itemsHTML = warmup.items.map(item => `
    <div class="warmup-item">
      <div class="warmup-dot" style="background:${item.dot}"></div>
      <div class="warmup-info">
        <div class="warmup-name">${item.name}</div>
        <div class="warmup-desc">${item.desc}</div>
      </div>
      <div class="warmup-time">${item.time}</div>
    </div>`).join('');

  block.innerHTML = `
    <div class="warmup-header" onclick="toggleWarmup()">
      <div class="warmup-header-left">
        <span class="warmup-icon">🔥</span>
        <div>
          <div class="warmup-title">Calentamiento</div>
          <div class="warmup-sub">${warmup.sub}</div>
        </div>
      </div>
      <span class="warmup-chevron">▼</span>
    </div>
    <div class="warmup-body">${itemsHTML}</div>`;

  container.innerHTML = '';
  container.appendChild(block);
}

function toggleWarmup() {
  document.getElementById('warmupBlock')?.classList.toggle('open');
}

function toggleEx(ei) {
  document.getElementById(`ec${ei}`).classList.toggle('open');
}

function toggleSetDone(ei, si, btn, exName, restSecs, color) {
  if(!activeSession) return;
  const db = getDB();
  const k = activeSession.dateKey;
  if(!db[k]) db[k]={type:activeSession.type,exercises:{}};
  if(!db[k].exercises[ei]) db[k].exercises[ei]={sets:{}};
  if(!db[k].exercises[ei].sets[si]) db[k].exercises[ei].sets[si]={};

  const wasAlreadyDone = db[k].exercises[ei].sets[si].done;
  const nowDone = !wasAlreadyDone;

  db[k].exercises[ei].sets[si].done = nowDone;
  saveDB(db);

  btn.classList.toggle('done', nowDone);
  const row = document.getElementById(`sr${ei}_${si}`);
  if(row) row.classList.toggle('done-row', nowDone);

  if(nowDone) {
    const session = SESSIONS[activeSession.type];
    const ex = session?.exercises[ei];
    const totalSets = ex?.sets || 0;
    const setLabel = `Serie ${si+1} de ${totalSets} completada`;
    startRest(restSecs, exName, setLabel, color);
  }
}

function finishSession() {
  if(!activeSession) return;
  const db = getDB();
  const k = activeSession.dateKey;
  if(!db[k]) db[k]={};
  db[k].done = true;
  db[k].type = activeSession.type;
  let total=0;
  Object.values(db[k].exercises||{}).forEach(ex=>Object.values(ex.sets||{}).forEach(s=>{if(s.done)total++;}));
  db[k].totalSets = total;
  saveDB(db);
  const btn = document.getElementById('finishBtn');
  btn.textContent = '✓ Sesión completada — volver a marcar';
  btn.className = 'finish-btn done-state';
  toast('¡Sesión completada! 💪');
  setTimeout(()=>goBack(), 1100);
}

// ══════════════════════════════════════════════════
// HISTORY VIEW
// ══════════════════════════════════════════════════
function renderHistory() {
  const db = getDB();
  const list = document.getElementById('histList');
  list.innerHTML = '';
  const keys = Object.keys(db).filter(k=>db[k].done).sort().reverse();
  if(!keys.length){
    list.innerHTML='<div class="empty-state">Aún no hay sesiones completadas.<br>¡Empieza hoy y construye tu racha!</div>';
    return;
  }
  const labels = {push:'Superior Empuje',pull:'Superior Jalón','legs-q':'Inferior Glúteo','legs-f':'Inferior Pierna Completa'};
  keys.forEach(k=>{
    const d=db[k];
    const date=new Date(k+'T12:00:00');
    const meta=TYPE_META[d.type]||TYPE_META.rest;
    const item=document.createElement('div');
    item.className='hist-item';
    item.innerHTML=`
      <div class="hist-stripe ${meta.stripeClass}"></div>
      <div class="hist-info">
        <div class="hist-date">${date.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
        <div class="hist-name">${labels[d.type]||d.type||'Sesión'}</div>
        <div class="hist-sets">${d.totalSets||0} sets completados</div>
      </div>
      <span class="hist-badge ${meta.pillClass}">${meta.label}</span>`;
    list.appendChild(item);
  });
}

// ══════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bnav').style.display='flex';
  document.getElementById('backBtn').style.display='none';

  if(name==='week'){
    document.getElementById('viewWeek').classList.add('active');
    document.getElementById('navWeek').classList.add('active');
    renderWeek();
  } else if(name==='session'){
    document.getElementById('viewSession').classList.add('active');
    document.getElementById('bnav').style.display='none';
    document.getElementById('backBtn').style.display='flex';
  } else if(name==='history'){
    document.getElementById('viewHistory').classList.add('active');
    document.getElementById('navHist').classList.add('active');
    renderHistory();
  }
}

function goBack() {
  closeRest();
  showView('week');
}

// INIT
renderWeek();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
